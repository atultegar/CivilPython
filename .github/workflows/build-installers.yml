name: Build CivilPython Installers

on:
  push:
    branches: [ master, main, release/* ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-installers:
    runs-on: windows-latest

    strategy:
      matrix:
        dotnet-version: ['8.0.x']

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build CivilPython 2023
      run: dotnet build CivilPython/CivilPython.csproj -c 2023 --no-restore -p:Platform=x64

    - name: Build CivilPython 2024
      run: dotnet build CivilPython/CivilPython.csproj -c 2024 --no-restore -p:Platform=x64

    - name: Build CivilPython 2025
      run: dotnet build CivilPython/CivilPython.csproj -c 2025 --no-restore -p:Platform=x64

    - name: Build CivilPython 2026
      run: dotnet build CivilPython/CivilPython.csproj -c 2026 --no-restore -p:Platform=x64

    - name: Build Installer Project
      run: dotnet build CivilPythonInstaller/CivilPythonInstaller.csproj -c Release --no-restore

    - name: Generate Installers
      run: dotnet run --project CivilPythonInstaller/CivilPythonInstaller.csproj --configuration Release --no-build

    - name: List generated installers
      run: |
        Write-Host "Generated MSI files:"
        Get-ChildItem -Path "CivilPython\bundles\*.msi" | ForEach-Object { Write-Host "  - $($_.Name)" }
        Write-Host "`nGenerated EXE files:"
        Get-ChildItem -Path "CivilPython\bundles\*.exe" | ForEach-Object { Write-Host "  - $($_.Name)" }
      shell: pwsh

    - name: Upload artifacts - MSI 2023
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: CivilPython2023.msi
        path: CivilPython/bundles/CivilPython2023.msi
        retention-days: 30

    - name: Upload artifacts - MSI 2024
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: CivilPython2024.msi
        path: CivilPython/bundles/CivilPython2024.msi
        retention-days: 30

    - name: Upload artifacts - MSI 2025
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: CivilPython2025.msi
        path: CivilPython/bundles/CivilPython2025.msi
        retention-days: 30

    - name: Upload artifacts - MSI 2026
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: CivilPython2026.msi
        path: CivilPython/bundles/CivilPython2026.msi
        retention-days: 30

    - name: Upload artifacts - Bootstrapper
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: CivilPythonBootstrapper.exe
        path: CivilPython/bundles/CivilPythonBootstrapper.exe
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          CivilPython/bundles/CivilPython2023.msi
          CivilPython/bundles/CivilPython2024.msi
          CivilPython/bundles/CivilPython2025.msi
          CivilPython/bundles/CivilPython2026.msi
          CivilPython/bundles/CivilPythonBootstrapper.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build logs
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: build-logs
        path: logs/
        retention-days: 7
